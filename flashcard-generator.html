<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Recall — master your flashcards</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f8fafc;
            color: #0f172a;
            line-height: 1.4;
            transition: background 0.2s, color 0.2s;
        }

        body.dark {
            background: #0f172a;
            color: #eef2ff;
        }

        body.dark .sidebar {
            background: #1e293b;
            border-right-color: #334155;
        }

        body.dark .deck-card, body.dark .stat-card, body.dark .modal-card, body.dark .flashcard-3d, body.dark [style*="background:white"] {
            background: #1e293b !important;
            border-color: #334155 !important;
            color: #e2e8f0;
        }

        body.dark .btn-secondary {
            background: #334155;
            border-color: #475569;
            color: #e2e8f0;
        }

        body.dark .nav-item:hover, body.dark .nav-item.active {
            background: #334155;
        }

        .app-layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: white;
            border-right: 1px solid #e9eef3;
            padding: 2rem 1.5rem;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            transition: background 0.2s;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 2rem;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.75rem 1rem;
            border-radius: 14px;
            color: #334155;
            font-weight: 500;
            margin: 4px 0;
            cursor: pointer;
            transition: all 0.15s;
        }

        body.dark .nav-item {
            color: #cbd5e1;
        }

        .nav-item:hover, .nav-item.active {
            background: #f1f5f9;
            color: #2563eb;
        }

        body.dark .nav-item:hover, body.dark .nav-item.active {
            background: #334155;
            color: #60a5fa;
        }

        .main-content {
            flex: 1;
            padding: 2rem 2.5rem;
            overflow-y: auto;
        }

        .decks-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .btn-primary {
            background: #2563eb;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.1s;
        }

        .btn-primary:hover {
            background: #1d4ed8;
            transform: scale(0.98);
        }

        .btn-secondary {
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: 0.1s;
        }

        .btn-secondary:hover {
            background: #e2e8f0;
        }

        .decks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }

        .deck-card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid #eef2ff;
            transition: all 0.2s;
            cursor: pointer;
        }

        .deck-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px -12px rgba(0,0,0,0.08);
        }

        .deck-cover {
            height: 110px;
            background: linear-gradient(145deg, #3b82f6, #8b5cf6);
            position: relative;
        }

        .deck-info {
            padding: 1.2rem;
        }

        .deck-name {
            font-weight: 700;
            font-size: 1.2rem;
        }

        .progress-bar {
            background: #e2e8f0;
            border-radius: 20px;
            height: 6px;
            margin: 12px 0;
        }

        .progress-fill {
            background: #2563eb;
            height: 100%;
            border-radius: 20px;
            width: 0%;
        }

        .folder-group {
            margin-top: 24px;
        }

        .folder-title {
            font-weight: 600;
            margin: 20px 0 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #1e293b;
        }

        body.dark .folder-title {
            color: #cbd5e1;
        }

        .modal {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-card {
            background: white;
            border-radius: 32px;
            padding: 2rem;
            width: 520px;
            max-width: 90%;
            max-height: 85vh;
            overflow-y: auto;
        }

        .input-field, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 20px;
            border: 1px solid #cbd5e1;
            margin: 12px 0;
            font-family: inherit;
        }

        body.dark .input-field, body.dark textarea {
            background: #334155;
            border-color: #475569;
            color: white;
        }

        .hidden {
            display: none;
        }

        .study-container {
            max-width: 780px;
            margin: 0 auto;
        }

        .flashcard-3d {
            background: white;
            border-radius: 2rem;
            padding: 3rem 2rem;
            margin: 2rem 0;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }

        .rating-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .rating-btn {
            background: #f1f5f9;
            border: none;
            padding: 10px 20px;
            border-radius: 60px;
            font-weight: 600;
            display: inline-flex;
            flex-direction: column;
            cursor: pointer;
            transition: 0.1s;
        }

        .rating-btn:hover {
            background: #e2e8f0;
            transform: scale(0.96);
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: #0f172a;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            z-index: 1100;
            transform: translateY(100px);
            transition: 0.2s;
        }

        .toast.show {
            transform: translateY(0);
        }

        .theme-toggle {
            position: absolute;
            bottom: 2rem;
            left: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 40px;
            background: #f1f5f9;
            width: calc(100% - 3rem);
        }

        body.dark .theme-toggle {
            background: #334155;
        }

        .bulk-textarea {
            font-family: 'Monaco', monospace;
            font-size: 0.85rem;
            min-height: 200px;
        }

        .card-list-item {
            background: #f8fafc;
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        body.dark .card-list-item {
            background: #334155;
        }
    </style>
</head>
<body>
<div class="app-layout">
    <div class="sidebar">
        <div class="logo">recall.</div>
        <div class="nav-item active" data-nav="home"><i class="fas fa-home"></i> Home</div>
        <div class="nav-item" data-nav="decks"><i class="fas fa-layer-group"></i> Decks & Folders</div>
        <div class="nav-item" data-nav="cards"><i class="fas fa-cards"></i> Card Manager</div>
        <div class="nav-item" data-nav="stats"><i class="fas fa-chart-simple"></i> Progress</div>
        <div style="margin-top: 2rem;"><button id="createDeckSidebarBtn" class="btn-primary"><i class="fas fa-plus"></i> New Deck</button></div>
        <div class="theme-toggle" id="themeToggleBtn"><i class="fas fa-moon"></i> Dark theme</div>
    </div>
    <div class="main-content" id="mainView"></div>
</div>
<div id="toastMsg" class="toast">✔️ Done</div>

<script>
    // ---------- ADVANCED STATE: DECKS, FOLDERS, CARDS (SM-2) ----------
    let appState = {
        folders: [
            { id: 'f1', name: 'Science' },
            { id: 'f2', name: 'Languages' }
        ],
        decks: [
            { id: 'd1', name: 'Biology', folderId: 'f1', coverGradient: 'linear-gradient(145deg,#2563eb,#7c3aed)', cards: [] },
            { id: 'd2', name: 'Physics', folderId: 'f1', coverGradient: 'linear-gradient(145deg,#059669,#10b981)', cards: [] },
            { id: 'd3', name: 'Spanish', folderId: 'f2', coverGradient: 'linear-gradient(145deg,#dc2626,#f97316)', cards: [] }
        ]
    };

    function initDemo() {
        if (localStorage.getItem('recall_ultimate_v2')) return;
        appState.decks[0].cards = [
            { id: 'c1', front: 'Photosynthesis', back: 'Plants convert light into energy', repetitions: 0, ease: 2.5, interval: 0, dueDate: Date.now() - 10000 },
            { id: 'c2', front: 'Mitochondria', back: 'Powerhouse of the cell', repetitions: 0, ease: 2.5, interval: 0, dueDate: Date.now() - 20000 },
            { id: 'c3', front: 'Cell Division', back: 'Process of splitting into daughter cells', repetitions: 0, ease: 2.5, interval: 0, dueDate: Date.now() - 5000 }
        ];
        appState.decks[1].cards = [
            { id: 'c4', front: 'Newton\'s First Law', back: 'Inertia: object remains at rest or uniform motion', repetitions: 0, ease: 2.5, interval: 0, dueDate: Date.now() - 10000 },
            { id: 'c5', front: 'Ohm\'s Law', back: 'V = I × R', repetitions: 0, ease: 2.5, interval: 0, dueDate: Date.now() - 10000 }
        ];
        appState.decks[2].cards = [
            { id: 'c6', front: 'Hola', back: 'Hello', repetitions: 0, ease: 2.5, interval: 0, dueDate: Date.now() - 5000 }
        ];
        saveFull();
    }

    function saveFull() { localStorage.setItem('recall_ultimate_v2', JSON.stringify(appState)); }
    function loadFull() {
        let raw = localStorage.getItem('recall_ultimate_v2');
        if (raw) appState = JSON.parse(raw);
        else initDemo();
    }

    function updateCard(card, rating) {
        let quality = [0,2,3,4][rating];
        if(card.repetitions === undefined) { card.repetitions = 0; card.ease = 2.5; card.interval = 0; }
        if(quality >= 3) card.repetitions++;
        else card.repetitions = 0;
        if(card.repetitions === 1) card.interval = 1;
        else if(card.repetitions === 2) card.interval = 6;
        else card.interval = Math.round(card.interval * card.ease);
        card.ease = Math.max(1.3, card.ease + (0.1 - (5-quality)*(0.08+(5-quality)*0.02)));
        card.dueDate = Date.now() + (card.interval * 86400000);
        card.lastReview = Date.now();
        saveFull();
        return card.interval;
    }

    function getDueCards() {
        let due = [];
        for(let deck of appState.decks) {
            for(let card of deck.cards) {
                if(!card.dueDate || card.dueDate <= Date.now()) due.push({...card, deckName: deck.name, deckId: deck.id});
            }
        }
        return due;
    }

    let currentNav = 'home';
    let studySession = { cards: [], index: 0, flipped: false };

    // Theme handling
    function initTheme() {
        let theme = localStorage.getItem('recall_theme') || 'light';
        if (theme === 'dark') document.body.classList.add('dark');
        document.getElementById('themeToggleBtn')?.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            let isDark = document.body.classList.contains('dark');
            localStorage.setItem('recall_theme', isDark ? 'dark' : 'light');
        });
    }

    // Render Home
    function renderHome() {
        let dueCards = getDueCards();
        let dueCount = dueCards.length;
        let studyMinutes = Math.ceil(dueCount * 0.28);
        let mastered = appState.decks.flatMap(d=>d.cards).filter(c=>c.repetitions>=4 && c.ease>2.2).length;
        let totalCards = appState.decks.flatMap(d=>d.cards).length;
        let retention = totalCards ? Math.floor(appState.decks.flatMap(d=>d.cards).reduce((acc,c)=>acc+(c.ease||2.5),0)/totalCards * 30) : 70;
        let streak = localStorage.getItem('streak') ? parseInt(localStorage.getItem('streak')) : 2;
        let weakCards = appState.decks.flatMap(d=>d.cards).filter(c=>c.ease && c.ease<1.8).slice(0,3).map(c=>c.front);
        if(weakCards.length<3) weakCards = ['Review fundamentals', 'Practice daily', 'Active recall'];
        const html = `
            <div style="max-width: 1000px;">
                <div style="background:white; border-radius:2rem; padding:2rem; margin-bottom:2rem;">
                    <h1 style="font-size:2.2rem;">Good ${new Date().getHours()<12?'Morning':'Afternoon'}, Learner</h1>
                    <div style="font-size:2.8rem; font-weight:700; color:#2563eb; margin:0.5rem 0;">${dueCount} cards due today</div>
                    <div style="color:#475569;">⏱️ ~${studyMinutes} min study time</div>
                    <button id="globalStudyBtn" style="margin-top:1.5rem;" class="btn-primary"><i class="fas fa-play"></i> Continue Studying →</button>
                </div>
                <div style="display:flex; gap:1.5rem; flex-wrap:wrap; margin-bottom:2rem;">
                    <div class="stat-card" style="background:white; border-radius:1.5rem; padding:1.2rem 1.8rem; flex:1;"><div style="color:#64748b;">Retention</div><div style="font-size:2rem; font-weight:700;">${retention}%</div></div>
                    <div class="stat-card" style="background:white; border-radius:1.5rem; padding:1.2rem 1.8rem; flex:1;"><div style="color:#64748b;">Mastered</div><div style="font-size:2rem; font-weight:700;">${mastered}</div></div>
                    <div class="stat-card" style="background:white; border-radius:1.5rem; padding:1.2rem 1.8rem; flex:1;"><div style="color:#64748b;">Streak</div><div style="font-size:2rem; font-weight:700;">${streak} days</div></div>
                </div>
                <div style="background:white; border-radius:1.5rem; padding:1.5rem; margin-bottom:2rem;">
                    <div style="font-weight:600;">📌 Weak areas</div><div style="display:flex; gap:0.8rem; margin-top:0.8rem;">${weakCards.map(w=>`<span style="background:#fee2e2; padding:0.3rem 1rem; border-radius:40px;">${w}</span>`).join('')}</div>
                </div>
                <h3>Your decks</h3>
                <div class="decks-grid" id="homeDecksGrid"></div>
            </div>
        `;
        document.getElementById('mainView').innerHTML = html;
        document.getElementById('globalStudyBtn')?.addEventListener('click', startGlobalStudy);
        renderDecksGridInto('homeDecksGrid', true);
    }

    function startGlobalStudy() {
        let due = getDueCards();
        if(due.length===0) { showToast('No cards due! 🎉'); return; }
        studySession.cards = due;
        studySession.index = 0;
        studySession.flipped = false;
        currentNav = 'study';
        renderStudyPage();
    }

    function startDeckStudy(deckId) {
        let deck = appState.decks.find(d=>d.id===deckId);
        if(!deck) return;
        let due = deck.cards.filter(c=> (!c.dueDate || c.dueDate <= Date.now()));
        if(due.length===0) { showToast('No cards due in this deck'); return; }
        studySession.cards = due.map(c => ({...c, deckId: deck.id, deckName: deck.name}));
        studySession.index = 0;
        studySession.flipped = false;
        currentNav = 'study';
        renderStudyPage();
    }

    function renderStudyPage() {
        if(studySession.index >= studySession.cards.length) {
            showToast('Session complete! Great job.');
            currentNav = 'home';
            renderHome();
            return;
        }
        let card = studySession.cards[studySession.index];
        let flipped = studySession.flipped;
        let html = `
            <div class="study-container">
                <div style="text-align:center; color:#475569;">${studySession.index+1} / ${studySession.cards.length}</div>
                <div class="flashcard-3d" id="flashcardArea">
                    <div style="font-size:0.75rem; color:#2563eb;">${flipped ? 'ANSWER' : 'QUESTION'}</div>
                    <div style="font-size:1.8rem; font-weight:500; margin-top:1rem;">${flipped ? card.back : card.front}</div>
                </div>
                <div id="actionArea">
                    <button id="revealStudyBtn" class="btn-primary" style="background:#1e293b;">↺ Reveal answer</button>
                </div>
                <div id="ratingsArea" style="display:none;" class="rating-buttons">
                    <button class="rating-btn" data-rating="0">Again <small>10min</small></button>
                    <button class="rating-btn" data-rating="1">Hard <small>1d</small></button>
                    <button class="rating-btn" data-rating="2">Good <small>5d</small></button>
                    <button class="rating-btn" data-rating="3">Easy <small>14d</small></button>
                </div>
                <button id="backHomeStudy" style="margin-top:2rem; background:none; border:none; color:#2563eb; cursor:pointer;">← Back home</button>
            </div>
        `;
        document.getElementById('mainView').innerHTML = html;
        document.getElementById('revealStudyBtn')?.addEventListener('click', () => {
            studySession.flipped = true;
            renderStudyPage();
        });
        document.getElementById('backHomeStudy')?.addEventListener('click', () => { currentNav = 'home'; renderHome(); });
        if(flipped) {
            document.getElementById('actionArea').innerHTML = '';
            let ratingsDiv = document.getElementById('ratingsArea');
            ratingsDiv.style.display = 'flex';
            document.querySelectorAll('.rating-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    let rating = parseInt(btn.dataset.rating);
                    let originalCard = studySession.cards[studySession.index];
                    let deck = appState.decks.find(d => d.id === originalCard.deckId);
                    let realCard = deck.cards.find(c => c.id === originalCard.id);
                    if(realCard) updateCard(realCard, rating);
                    let streak = parseInt(localStorage.getItem('streak') || '1');
                    let last = localStorage.getItem('lastStudy');
                    let today = new Date().toDateString();
                    if(last !== today) { streak = last ? streak+1 : 1; localStorage.setItem('streak', streak); localStorage.setItem('lastStudy', today); }
                    studySession.index++;
                    studySession.flipped = false;
                    renderStudyPage();
                });
            });
        }
    }

    function renderDecksManager() {
        let html = `<div class="decks-header"><h2>📚 Decks & Folders</h2><div><button id="newFolderBtn" class="btn-secondary"><i class="fas fa-folder"></i> Folder</button> <button id="newDeckManagerBtn" class="btn-primary"><i class="fas fa-plus"></i> Deck</button></div></div>`;
        for(let folder of appState.folders) {
            let folderDecks = appState.decks.filter(d => d.folderId === folder.id);
            html += `<div class="folder-group"><div class="folder-title"><i class="fas fa-folder-open"></i> ${folder.name}</div><div class="decks-grid" id="folder-${folder.id}"></div></div>`;
        }
        let uncategorized = appState.decks.filter(d => !d.folderId);
        if(uncategorized.length || true) html += `<div class="folder-group"><div class="folder-title"><i class="fas fa-inbox"></i> Uncategorized</div><div class="decks-grid" id="uncategorizedGrid"></div></div>`;
        document.getElementById('mainView').innerHTML = html;
        for(let folder of appState.folders) renderDecksGridInto(`folder-${folder.id}`, false, folder.id);
        renderDecksGridInto(`uncategorizedGrid`, false, null);
        document.getElementById('newFolderBtn')?.addEventListener('click', () => { let name = prompt('Folder name'); if(name) { appState.folders.push({ id: Date.now()+'', name }); saveFull(); renderDecksManager(); showToast('Folder added'); } });
        document.getElementById('newDeckManagerBtn')?.addEventListener('click', () => openDeckModal());
    }

    function openDeckModal(deckId=null) {
        let modalDiv = document.createElement('div'); modalDiv.className = 'modal';
        modalDiv.innerHTML = `<div class="modal-card"><h3>${deckId?'Edit Deck':'New Deck'}</h3><input id="deckNameInput" class="input-field" placeholder="Deck name"><select id="folderSelect" class="input-field"><option value="">No folder</option>${appState.folders.map(f=>`<option value="${f.id}">${f.name}</option>`).join('')}</select><div style="display:flex; gap:12px; margin-top:1rem;"><button id="saveDeckModalBtn" class="btn-primary">Save</button><button id="closeModalBtn">Cancel</button></div></div>`;
        document.body.appendChild(modalDiv);
        document.getElementById('saveDeckModalBtn').onclick = () => {
            let name = document.getElementById('deckNameInput').value;
            let folderId = document.getElementById('folderSelect').value || null;
            if(name) {
                if(!deckId) appState.decks.push({ id: Date.now()+'', name, folderId, coverGradient: 'linear-gradient(145deg,#3b82f6,#a855f7)', cards: [] });
                else { let d = appState.decks.find(d=>d.id===deckId); if(d) { d.name = name; d.folderId = folderId; } }
                saveFull(); renderDecksManager(); showToast('Deck saved');
                modalDiv.remove();
            }
        };
        document.getElementById('closeModalBtn').onclick = () => modalDiv.remove();
    }

    function renderDecksGridInto(containerId, clickToStudy=false, filterFolder=null) {
        let container = document.getElementById(containerId);
        if(!container) return;
        let decksToShow = filterFolder !== undefined ? appState.decks.filter(d => d.folderId === filterFolder) : appState.decks;
        container.innerHTML = decksToShow.map(deck => `
            <div class="deck-card" data-deck-id="${deck.id}">
                <div class="deck-cover" style="background:${deck.coverGradient}"></div>
                <div class="deck-info">
                    <div class="deck-name">${deck.name}</div>
                    <div>${deck.cards.length} cards · ${deck.cards.filter(c=>c.dueDate<=Date.now()).length} due</div>
                    <div class="progress-bar"><div class="progress-fill" style="width:${Math.floor(deck.cards.filter(c=>c.repetitions>2).length/deck.cards.length*100)||0}%"></div></div>
                    <div style="display:flex; gap:8px; margin-top:12px;"><button class="studyDeckBtn" data-id="${deck.id}" style="background:#2563eb; color:white; border:none; border-radius:30px; padding:6px 14px;">Study</button> <button class="editDeckBtn" data-id="${deck.id}" style="background:#e2e8f0; border:none; border-radius:30px;">Edit</button> <button class="deleteDeckBtn" data-id="${deck.id}" style="background:#fee2e2;">Delete</button></div>
                </div>
            </div>
        `).join('');
        document.querySelectorAll('.studyDeckBtn').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); startDeckStudy(btn.dataset.id); }));
        document.querySelectorAll('.editDeckBtn').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); openDeckModal(btn.dataset.id); }));
        document.querySelectorAll('.deleteDeckBtn').forEach(btn => btn.addEventListener('click', (e) => { e.stopPropagation(); if(confirm('Delete deck?')) { appState.decks = appState.decks.filter(d => d.id !== btn.dataset.id); saveFull(); renderDecksManager(); showToast('Deleted'); } }));
        if(clickToStudy) document.querySelectorAll('.deck-card').forEach(card => card.addEventListener('click', (e) => { if(!e.target.closest('button')) startDeckStudy(card.dataset.deckId); }));
    }

    // Enhanced Card Manager with Add Card, Bulk Import
    function renderCardManager() {
        let html = `
            <div class="decks-header"><h2>📇 Card Manager</h2><div><button id="addSingleCardBtn" class="btn-primary"><i class="fas fa-plus"></i> Add Card</button><button id="bulkImportBtn" class="btn-secondary"><i class="fas fa-upload"></i> Bulk Import</button></div></div>
            <div id="cardsListContainer" class="cards-list"></div>
        `;
        document.getElementById('mainView').innerHTML = html;
        refreshCardsList();
        document.getElementById('addSingleCardBtn')?.addEventListener('click', () => openAddCardModal());
        document.getElementById('bulkImportBtn')?.addEventListener('click', () => openBulkModal());
    }

    function refreshCardsList() {
        let container = document.getElementById('cardsListContainer');
        let allCards = [];
        for(let deck of appState.decks) {
            for(let card of deck.cards) {
                allCards.push({...card, deckName: deck.name, deckId: deck.id});
            }
        }
        if(allCards.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:3rem;">No cards yet. Click "Add Card" to create your first flashcard.</div>';
            return;
        }
        container.innerHTML = allCards.map(card => `
            <div class="card-list-item">
                <div><strong>${card.front}</strong><br><span style="font-size:0.8rem;">→ ${card.back}</span><br><small style="color:#64748b;">📘 ${card.deckName}</small></div>
                <div><button class="deleteCardBtn" data-deck="${card.deckId}" data-cardid="${card.id}" style="background:#fee2e2; border:none; padding:6px 12px; border-radius:20px;">Delete</button></div>
            </div>
        `).join('');
        document.querySelectorAll('.deleteCardBtn').forEach(btn => btn.addEventListener('click', () => {
            let deck = appState.decks.find(d=>d.id===btn.dataset.deck);
            if(deck) { deck.cards = deck.cards.filter(c=>c.id !== btn.dataset.cardid); saveFull(); refreshCardsList(); showToast('Card removed'); }
        }));
    }

    function openAddCardModal() {
        let modalDiv = document.createElement('div'); modalDiv.className = 'modal';
        modalDiv.innerHTML = `<div class="modal-card"><h3>Add New Card</h3><select id="cardDeckSelect" class="input-field">${appState.decks.map(d=>`<option value="${d.id}">${d.name}</option>`).join('')}</select><input id="cardFrontInput" class="input-field" placeholder="Front / Question"><textarea id="cardBackInput" class="input-field" rows="3" placeholder="Back / Answer"></textarea><div style="display:flex; gap:12px;"><button id="saveCardBtn" class="btn-primary">Save Card</button><button id="closeCardModal">Cancel</button></div></div>`;
        document.body.appendChild(modalDiv);
        document.getElementById('saveCardBtn').onclick = () => {
            let deckId = document.getElementById('cardDeckSelect').value;
            let front = document.getElementById('cardFrontInput').value.trim();
            let back = document.getElementById('cardBackInput').value.trim();
            if(front && back) {
                let deck = appState.decks.find(d=>d.id===deckId);
                if(deck) { deck.cards.push({ id: Date.now()+''+Math.random(), front, back, repetitions:0, ease:2.5, interval:0, dueDate: Date.now() }); saveFull(); refreshCardsList(); showToast('Card added'); modalDiv.remove(); }
            } else showToast('Fill both sides');
        };
        document.getElementById('closeCardModal').onclick = () => modalDiv.remove();
    }

    function openBulkModal() {
        let modalDiv = document.createElement('div'); modalDiv.className = 'modal';
        modalDiv.innerHTML = `<div class="modal-card"><h3>📦 Bulk Import Cards</h3><select id="bulkDeckSelect" class="input-field">${appState.decks.map(d=>`<option value="${d.id}">${d.name}</option>`).join('')}</select><textarea id="bulkData" class="input-field bulk-textarea" placeholder="Format: Front | Back&#10;Example:&#10;Photosynthesis | Plants convert light&#10;Mitochondria | Powerhouse of cell&#10;一行一个卡片，用竖线分隔"></textarea><div style="display:flex; gap:12px;"><button id="processBulkBtn" class="btn-primary">Import Cards</button><button id="closeBulkModal">Cancel</button></div></div>`;
        document.body.appendChild(modalDiv);
        document.getElementById('processBulkBtn').onclick = () => {
            let deckId = document.getElementById('bulkDeckSelect').value;
            let raw = document.getElementById('bulkData').value;
            let lines = raw.split(/\r?\n/);
            let added = 0;
            let deck = appState.decks.find(d=>d.id===deckId);
            if(!deck) return;
            for(let line of lines) {
                line = line.trim();
                if(line === '') continue;
                let separator = line.includes('|') ? '|' : (line.includes(';') ? ';' : null);
                let front, back;
                if(separator) {
                    let idx = line.indexOf(separator);
                    front = line.substring(0, idx).trim();
                    back = line.substring(idx+1).trim();
                } else { front = line; back = line; }
                if(front) {
                    deck.cards.push({ id: Date.now()+''+Math.random()+added, front, back: back || front, repetitions:0, ease:2.5, interval:0, dueDate: Date.now() });
                    added++;
                }
            }
            if(added) { saveFull(); refreshCardsList(); showToast(`✨ Added ${added} cards!`); modalDiv.remove(); }
            else showToast('No valid cards found');
        };
        document.getElementById('closeBulkModal').onclick = () => modalDiv.remove();
    }

    function renderStats() {
        let totalCards = appState.decks.flatMap(d=>d.cards).length;
        let mastered = appState.decks.flatMap(d=>d.cards).filter(c=>c.repetitions>=4).length;
        let accuracy = totalCards ? Math.floor(appState.decks.flatMap(d=>d.cards).reduce((acc,c)=>acc+(c.ease||2.5),0)/totalCards * 30) : 70;
        let html = `<div style="background:white; border-radius:2rem; padding:2rem;"><h2>📈 Learning Progress</h2><div style="display:flex; gap:2rem; margin:2rem 0;"><div>📊 Retention: ${accuracy}%</div><div>🏆 Mastered: ${mastered}</div><div>📚 Total cards: ${totalCards}</div></div><div class="progress-bar" style="width:100%"><div class="progress-fill" style="width:${totalCards?Math.floor(mastered/totalCards*100):0}%"></div></div><p style="margin-top:1rem;">Keep reviewing daily to strengthen memory.</p></div>`;
        document.getElementById('mainView').innerHTML = html;
    }

    function showToast(msg) { let t=document.getElementById('toastMsg'); t.innerHTML='✔️ '+msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }

    function initRouting() {
        document.querySelectorAll('.nav-item').forEach(nav => {
            nav.addEventListener('click', () => {
                document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
                nav.classList.add('active');
                let navId = nav.dataset.nav;
                if(navId === 'home') { currentNav='home'; renderHome(); }
                else if(navId === 'decks') { currentNav='decks'; renderDecksManager(); }
                else if(navId === 'cards') { currentNav='cards'; renderCardManager(); }
                else if(navId === 'stats') { currentNav='stats'; renderStats(); }
            });
        });
        document.getElementById('createDeckSidebarBtn')?.addEventListener('click', () => openDeckModal());
    }

    loadFull();
    initTheme();
    initRouting();
    renderHome();
</script>
</body>
</html>
