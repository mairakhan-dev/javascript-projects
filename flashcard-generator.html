<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Recall — focused flashcard study</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f5f7fb;
            color: #1a1e2b;
            line-height: 1.4;
        }

        /* calm, whitespace-first design */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2rem 2rem 3rem;
        }

        /* header minimal */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
        }
        .logo {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .greeting {
            font-size: 0.95rem;
            color: #4b5563;
        }

        /* primary hero */
        .hero-section {
            background: white;
            border-radius: 2rem;
            padding: 2rem 2.5rem;
            margin-bottom: 2.5rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.02), 0 2px 4px rgba(0,0,0,0.02);
            border: 1px solid #eef2ff;
        }
        .hero-title {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
        }
        .due-large {
            font-size: 3rem;
            font-weight: 700;
            color: #2563eb;
            margin: 0.5rem 0 0.25rem;
        }
        .study-time {
            color: #4b5563;
            margin-bottom: 1.5rem;
        }
        .btn-primary-large {
            background: #2563eb;
            border: none;
            padding: 1rem 2.5rem;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(37,99,235,0.25);
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .btn-primary-large:hover {
            background: #1d4ed8;
            transform: scale(0.98);
        }

        /* 3‑card progress row */
        .stats-row {
            display: flex;
            gap: 1.5rem;
            margin: 2rem 0 2rem;
            flex-wrap: wrap;
        }
        .stat-card {
            background: white;
            border-radius: 1.5rem;
            padding: 1.25rem 1.8rem;
            flex: 1;
            border: 1px solid #eef2ff;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }
        .stat-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #6b7280;
            margin-bottom: 0.5rem;
        }
        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: #111827;
        }

        /* weak areas minimal */
        .weak-section {
            background: white;
            border-radius: 1.5rem;
            padding: 1.5rem 2rem;
            margin-bottom: 2rem;
            border: 1px solid #eef2ff;
        }
        .weak-title {
            font-weight: 600;
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }
        .weak-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
        }
        .weak-tag {
            background: #fee2e2;
            color: #b91c1c;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        /* recent decks grid */
        .decks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }
        .deck-card {
            background: white;
            border-radius: 1.8rem;
            overflow: hidden;
            transition: all 0.2s;
            border: 1px solid #eef2ff;
            cursor: pointer;
        }
        .deck-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 30px -12px rgba(0,0,0,0.1);
        }
        .deck-cover {
            height: 120px;
            background: linear-gradient(145deg, #3b82f6, #a855f7);
        }
        .deck-info {
            padding: 1.2rem;
        }
        .deck-name {
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 0.25rem;
        }
        .deck-stats {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #4b5563;
            margin: 0.5rem 0;
        }
        .progress-bar-bg {
            background: #e5e7eb;
            border-radius: 20px;
            height: 6px;
            overflow: hidden;
        }
        .progress-fill {
            background: #2563eb;
            width: 0%;
            height: 100%;
            border-radius: 20px;
        }

        /* STUDY PAGE (full focus) */
        .study-container {
            max-width: 760px;
            margin: 0 auto;
            text-align: center;
        }
        .study-progress {
            font-size: 0.9rem;
            color: #6b7280;
            margin-bottom: 1.5rem;
        }
        .flashcard-3d {
            background: white;
            border-radius: 2rem;
            padding: 3rem 2rem;
            margin: 2rem 0;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.2), 0 1px 2px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s;
            transform-style: preserve-3d;
            border: 1px solid #eef2ff;
        }
        .flashcard-3d:hover {
            transform: scale(1.01);
            box-shadow: 0 30px 50px -20px rgba(0,0,0,0.2);
        }
        .card-side-label {
            font-size: 0.75rem;
            letter-spacing: 1px;
            color: #2563eb;
            margin-bottom: 1rem;
        }
        .card-text {
            font-size: 1.8rem;
            line-height: 1.4;
            font-weight: 500;
        }
        .rating-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
        }
        .rating-btn {
            background: #f3f4f6;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.1s;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            min-width: 100px;
            font-size: 0.9rem;
        }
        .rating-btn small {
            font-size: 0.7rem;
            font-weight: normal;
            color: #4b5563;
        }
        .rating-btn:hover {
            background: #e5e7eb;
            transform: scale(0.96);
        }
        .reveal-btn {
            background: #111827;
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 60px;
            font-weight: 600;
            margin-top: 1rem;
            border: none;
            cursor: pointer;
        }

        .back-link {
            display: inline-block;
            margin-top: 2rem;
            color: #2563eb;
            cursor: pointer;
        }

        /* utility */
        .hidden {
            display: none;
        }
        button {
            background: none;
            border: none;
        }
    </style>
</head>
<body>
<div class="container" id="appRoot">
    <!-- dynamic views will be injected here -->
</div>

<script>
    // ------------------- FOCUSED DATA MODEL (SM-2) -------------------
    let appData = {
        decks: [],
        studySettings: { defaultEase: 2.5 }
    };

    // sample initial data
    function initSampleData() {
        if (localStorage.getItem('recall_app')) return;
        appData.decks = [
            { id: 'deck1', name: 'Biology 101', coverGradient: 'linear-gradient(145deg, #2563eb, #7c3aed)', cards: [
                { id: 'c1', front: 'Photosynthesis', back: 'Process by which plants convert light energy into chemical energy', repetitions: 0, ease: 2.5, interval: 0, dueDate: Date.now() - 10000, lastReview: 0, tags: ['biology'], strength: 0 },
                { id: 'c2', front: 'Mitochondria', back: 'Powerhouse of the cell', repetitions: 0, ease: 2.5, interval: 0, dueDate: Date.now() - 5000, lastReview: 0 },
                { id: 'c3', front: 'Cell Division', back: 'Process by which a parent cell divides into two daughter cells', repetitions: 0, ease: 2.5, interval: 0, dueDate: Date.now() - 20000, lastReview: 0 }
            ] },
            { id: 'deck2', name: 'Physics', coverGradient: 'linear-gradient(145deg, #059669, #10b981)', cards: [
                { id: 'c4', front: 'Newton\'s First Law', back: 'An object remains at rest or uniform motion unless acted by a force', repetitions: 0, ease: 2.5, interval: 0, dueDate: Date.now() - 10000, lastReview: 0 },
                { id: 'c5', front: 'Ohm\'s Law', back: 'V = IR', repetitions: 0, ease: 2.5, interval: 0, dueDate: Date.now() - 10000, lastReview: 0 }
            ] }
        ];
        saveData();
    }

    function saveData() { localStorage.setItem('recall_app', JSON.stringify(appData)); }
    function loadData() {
        let raw = localStorage.getItem('recall_app');
        if (raw) appData = JSON.parse(raw);
        else initSampleData();
    }

    // SM-2 update + next interval display
    function updateCardSM2(card, rating) { // rating 0=again,1=hard,2=good,3=easy
        let quality = [0, 2, 3, 4][rating];
        if (card.repetitions === undefined) { card.repetitions = 0; card.ease = 2.5; card.interval = 0; }
        if (quality >= 3) card.repetitions++;
        else card.repetitions = 0;

        if (card.repetitions === 1) card.interval = 1;
        else if (card.repetitions === 2) card.interval = 6;
        else card.interval = Math.round(card.interval * card.ease);
        card.ease = Math.max(1.3, card.ease + (0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02)));
        card.dueDate = Date.now() + (card.interval * 86400000);
        card.lastReview = Date.now();
        saveData();
        return card.interval;
    }

    // helper: get due cards count & weak topics based on review accuracy
    function getDueCardsCount() {
        let due = 0;
        for (let deck of appData.decks) {
            for (let card of deck.cards) {
                if (!card.dueDate || card.dueDate <= Date.now()) due++;
            }
        }
        return due;
    }

    function getWeakAreas() {
        // naive: from cards with low ease (<2.0) or high failure (last rating low)
        let weak = [];
        for (let deck of appData.decks) {
            for (let card of deck.cards) {
                if (card.ease && card.ease < 2.0) weak.push(card.front);
                else if (card.repetitions === 0 && card.dueDate && card.dueDate <= Date.now()) weak.push(card.front);
            }
        }
        return [...new Set(weak)].slice(0, 5);
    }

    function getMasteredCount() {
        let mastered = 0;
        for (let deck of appData.decks) {
            for (let card of deck.cards) {
                if (card.repetitions >= 5 && card.ease > 2.3) mastered++;
            }
        }
        return mastered;
    }

    function getRetentionRate() {
        // mock based on due/total? approximate using average ease
        let total = 0;
        let sumEase = 0;
        for (let deck of appData.decks) {
            for (let card of deck.cards) {
                total++;
                sumEase += card.ease || 2.5;
            }
        }
        if (total === 0) return 0;
        let avgEase = sumEase / total;
        return Math.min(100, Math.floor((avgEase - 1.3) / 1.7 * 100));
    }

    // ---------- RENDER HOMEPAGE (calm, minimal) ----------
    let currentView = 'home';
    let studySession = { deckId: null, dueCards: [], currentIndex: 0, isFlipped: false };

    function renderHome() {
        const dueTotal = getDueCardsCount();
        const studyTimeEst = Math.ceil(dueTotal * 0.28); // ~17 sec per card
        const streak = 3; // simplified from previous but keeping focus: retrieve from localStorage or compute
        let streakVal = localStorage.getItem('recall_streak') ? parseInt(localStorage.getItem('recall_streak')) : 2;
        const mastered = getMasteredCount();
        const retention = getRetentionRate();
        const weakTopics = getWeakAreas();

        const html = `
            <div class="top-bar">
                <div class="logo">recall.</div>
                <div class="greeting">Good ${new Date().getHours() < 12 ? 'Morning' : new Date().getHours() < 18 ? 'Afternoon' : 'Evening'}, Maya</div>
            </div>
            <div class="hero-section">
                <div class="hero-title">Ready to review?</div>
                <div class="due-large">${dueTotal} cards due today</div>
                <div class="study-time">⏱️ Estimated study time: ${studyTimeEst} minutes</div>
                <button class="btn-primary-large" id="continueStudyBtn"><i class="fas fa-play"></i> Continue Studying</button>
            </div>
            <div class="stats-row">
                <div class="stat-card"><div class="stat-label">Retention rate</div><div class="stat-number">${retention}%</div></div>
                <div class="stat-card"><div class="stat-label">Cards mastered</div><div class="stat-number">${mastered}</div></div>
                <div class="stat-card"><div class="stat-label">Current streak</div><div class="stat-number">${streakVal} days</div></div>
            </div>
            <div class="weak-section">
                <div class="weak-title">📘 You struggle with:</div>
                <div class="weak-list">
                    ${weakTopics.map(t => `<span class="weak-tag">${t}</span>`).join('') || '<span class="weak-tag">Keep reviewing, it gets easier</span>'}
                </div>
            </div>
            <div style="margin-top: 2rem;"><h3 style="font-weight: 600;">Recent decks</h3></div>
            <div class="decks-grid" id="recentDecksGrid">
                ${appData.decks.map(deck => `
                    <div class="deck-card" data-deck-id="${deck.id}">
                        <div class="deck-cover" style="background: ${deck.coverGradient}"></div>
                        <div class="deck-info">
                            <div class="deck-name">${deck.name}</div>
                            <div class="deck-stats"><span>${deck.cards.length} cards</span><span>${Math.floor(deck.cards.filter(c=>c.ease>2.2).length/deck.cards.length*100)||0}% mastered</span></div>
                            <div class="progress-bar-bg"><div class="progress-fill" style="width: ${Math.floor(deck.cards.filter(c=>c.repetitions>2).length/deck.cards.length*100)}%"></div></div>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
        document.getElementById('appRoot').innerHTML = html;
        document.getElementById('continueStudyBtn')?.addEventListener('click', () => startGlobalStudy());
        document.querySelectorAll('.deck-card').forEach(card => {
            card.addEventListener('click', (e) => {
                const deckId = card.dataset.deckId;
                startDeckStudy(deckId);
            });
        });
    }

    function startGlobalStudy() {
        // collect all due cards from all decks
        let dueCardsAll = [];
        for (let deck of appData.decks) {
            for (let card of deck.cards) {
                if (!card.dueDate || card.dueDate <= Date.now()) {
                    dueCardsAll.push({ ...card, deckId: deck.id, originalCard: card });
                }
            }
        }
        if (dueCardsAll.length === 0) { alert('No cards due today! Great job.'); return; }
        studySession.dueCards = dueCardsAll;
        studySession.currentIndex = 0;
        studySession.isFlipped = false;
        currentView = 'study';
        renderStudyPage();
    }

    function startDeckStudy(deckId) {
        const deck = appData.decks.find(d => d.id === deckId);
        if (!deck) return;
        let dueCards = deck.cards.filter(c => (!c.dueDate || c.dueDate <= Date.now()));
        if (dueCards.length === 0) { alert('No cards due in this deck. Choose another.'); return; }
        studySession.dueCards = dueCards.map(c => ({ ...c, deckId, originalCard: c }));
        studySession.currentIndex = 0;
        studySession.isFlipped = false;
        currentView = 'study';
        renderStudyPage();
    }

    function renderStudyPage() {
        const cards = studySession.dueCards;
        if (!cards.length || studySession.currentIndex >= cards.length) {
            // session end
            alert('Session complete! 🎉 Come back tomorrow.');
            currentView = 'home';
            renderHome();
            return;
        }
        const cardItem = cards[studySession.currentIndex];
        const card = cardItem.originalCard;
        const total = cards.length;
        const idx = studySession.currentIndex + 1;
        const isFlipped = studySession.isFlipped;

        const html = `
            <div class="study-container">
                <div class="study-progress">${idx} of ${total} · <span id="nextIntervalHint"></span></div>
                <div class="flashcard-3d" id="flashcard3d">
                    <div class="card-side-label">${isFlipped ? 'ANSWER' : 'QUESTION'}</div>
                    <div class="card-text" id="cardMainText">${isFlipped ? card.back : card.front}</div>
                </div>
                <div id="actionArea">
                    <button class="reveal-btn" id="revealBtn">⟳ Reveal answer</button>
                </div>
                <div class="rating-buttons" id="ratingGroup" style="display: none;">
                    <button class="rating-btn" data-rating="0">Again <small>10 min</small></button>
                    <button class="rating-btn" data-rating="1">Hard <small>1 day</small></button>
                    <button class="rating-btn" data-rating="2">Good <small>5 days</small></button>
                    <button class="rating-btn" data-rating="3">Easy <small>14 days</small></button>
                </div>
                <div class="back-link" id="backToHomeBtn">← Back to home</div>
            </div>
        `;
        document.getElementById('appRoot').innerHTML = html;

        // show interval preview
        const updateIntervalPreview = (rating) => {
            let intervalText = '';
            if (rating === 0) intervalText = '10 min';
            else if (rating === 1) intervalText = '1 day';
            else if (rating === 2) intervalText = '5 days';
            else intervalText = '14 days';
            document.getElementById('nextIntervalHint').innerText = `Next review: ${intervalText}`;
        };

        document.getElementById('revealBtn')?.addEventListener('click', () => {
            studySession.isFlipped = true;
            renderStudyPage(); // re-render to show back
        });
        document.getElementById('backToHomeBtn')?.addEventListener('click', () => { currentView = 'home'; renderHome(); });

        if (isFlipped) {
            document.getElementById('actionArea').innerHTML = '';
            const ratingDiv = document.getElementById('ratingGroup');
            ratingDiv.style.display = 'flex';
            document.querySelectorAll('.rating-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const ratingVal = parseInt(btn.dataset.rating);
                    const intervalDays = updateCardSM2(card, ratingVal);
                    // update streak (simple)
                    let streak = localStorage.getItem('recall_streak') ? parseInt(localStorage.getItem('recall_streak')) : 0;
                    let today = new Date().toDateString();
                    let last = localStorage.getItem('last_study_date');
                    if (last === today) { /* already counted */ } 
                    else if (last && new Date(last).getTime() + 86400000 >= new Date().getTime()) streak++;
                    else streak = 1;
                    localStorage.setItem('recall_streak', streak);
                    localStorage.setItem('last_study_date', today);
                    // move to next card
                    studySession.currentIndex++;
                    studySession.isFlipped = false;
                    renderStudyPage();
                });
            });
            // show interval preview on hover
            document.querySelectorAll('.rating-btn').forEach(btn => {
                btn.addEventListener('mouseenter', () => { updateIntervalPreview(parseInt(btn.dataset.rating)); });
            });
        }
    }

    // routing
    function route() {
        if (currentView === 'home') renderHome();
        else if (currentView === 'study') renderStudyPage();
    }

    loadData();
    // compute streak and render
    if (!localStorage.getItem('recall_streak')) localStorage.setItem('recall_streak', '2');
    route();
</script>
</body>
</html>
