<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Memora — AI‑grade Spaced Repetition | Ultimate Learning OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(ellipse at 30% 40%, #0a0f1e, #03050b);
            color: #eef2ff;
            overflow-x: hidden;
            transition: background 0.2s, color 0.2s;
        }

        /* theme variables */
        :root {
            --bg-primary: rgba(10, 15, 30, 0.75);
            --glass-edge: rgba(129, 140, 248, 0.3);
            --accent: #818cf8;
            --accent-glow: #4f46e5;
            --text-primary: #f1f5f9;
            --card-bg: rgba(30, 41, 59, 0.6);
        }

        body.light {
            --bg-primary: rgba(245, 245, 250, 0.85);
            --glass-edge: rgba(79, 70, 229, 0.2);
            --accent: #4f46e5;
            --text-primary: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.7);
            background: radial-gradient(circle at 20% 30%, #eef2ff, #d9e2ef);
            color: #0f172a;
        }
        body.cyberpunk {
            --accent: #00ffcc;
            --accent-glow: #ff00aa;
            background: #0b0b1f;
            color: #00ffcc;
        }

        .app-layout {
            display: flex;
            min-height: 100vh;
        }

        /* premium glass sidebar */
        .sidebar {
            width: 280px;
            background: rgba(5, 10, 25, 0.65);
            backdrop-filter: blur(18px);
            border-right: 1px solid var(--glass-edge);
            padding: 24px 16px;
            transition: all 0.2s;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
        }

        .logo {
            font-size: 1.7rem;
            font-weight: 800;
            background: linear-gradient(135deg, #c084fc, #60a5fa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 32px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 18px;
            border-radius: 24px;
            margin: 6px 0;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            font-weight: 500;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(129, 140, 248, 0.2);
            backdrop-filter: blur(4px);
            transform: translateX(4px);
        }

        .main-content {
            flex: 1;
            padding: 28px 32px;
            overflow-y: auto;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid var(--glass-edge);
            padding: 24px;
            transition: all 0.2s;
        }

        .dashboard-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-tile {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 20px;
            border: 1px solid #334155;
        }

        button, .btn {
            background: var(--accent);
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.1s linear;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        button:active { transform: scale(0.97); }

        .grid-decks {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            margin-top: 20px;
        }

        .deck-cover {
            height: 120px;
            border-radius: 24px;
            background: linear-gradient(145deg, #4f46e5, #7c3aed);
            margin-bottom: 16px;
        }

        /* modal & command palette */
        .cmd-palette {
            position: fixed;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            background: #0f172aee;
            backdrop-filter: blur(32px);
            border-radius: 40px;
            z-index: 2000;
            padding: 20px;
            border: 1px solid #818cf8;
            box-shadow: 0 30px 50px rgba(0,0,0,0.6);
            display: none;
        }
        .focus-mode-overlay {
            position: fixed;
            inset: 0;
            background: #000000dd;
            backdrop-filter: blur(20px);
            z-index: 1500;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #10b981;
            border-radius: 60px;
            padding: 12px 24px;
            font-weight: bold;
            z-index: 3000;
            transform: translateY(100px);
            transition: 0.2s;
        }
        .toast.show { transform: translateY(0); }
        @media (max-width: 800px) { .sidebar { width: 80px; padding: 20px 8px; } .sidebar span:not(.logo) { display: none; } .main-content { padding: 20px; } }
    </style>
</head>
<body>
<div class="app-layout">
    <div class="sidebar">
        <div class="logo"><i class="fas fa-brain"></i> Memora</div>
        <div class="nav-item active" data-nav="dashboard"><i class="fas fa-chart-line"></i> <span>Dashboard</span></div>
        <div class="nav-item" data-nav="decks"><i class="fas fa-layer-group"></i> <span>Decks & Folders</span></div>
        <div class="nav-item" data-nav="study"><i class="fas fa-graduation-cap"></i> <span>Smart Study</span></div>
        <div class="nav-item" data-nav="focus"><i class="fas fa-expand-alt"></i> <span>Focus Mode</span></div>
        <div class="nav-item" data-nav="stats"><i class="fas fa-chart-simple"></i> <span>Analytics</span></div>
        <div class="nav-item" data-nav="settings"><i class="fas fa-cog"></i> <span>Settings</span></div>
        <div style="margin-top: 40px;"><div id="xpBar" class="glass-card" style="padding:12px;">⭐ Lv.1 <progress id="xpProgress" value="0" max="100" style="width:100%"></progress></div></div>
    </div>
    <div class="main-content" id="mainView"></div>
</div>
<div id="commandPalette" class="cmd-palette"><input type="text" id="cmdInput" placeholder="Search decks, cards or type command..."><div id="cmdResults"></div></div>
<div id="focusOverlay" class="focus-mode-overlay"><div id="focusCardArea" style="background:#1e293b; padding:40px; border-radius:48px; max-width:600px;"><h2 id="focusQuestion"></h2><div id="focusActions"></div><div>🍅 Pomodoro: <span id="pomodoroTimer">25:00</span></div><button id="exitFocus">Exit Focus</button></div></div>
<div id="globalToast" class="toast"></div>
<script>
    // --------------------- ADVANCED STATE ---------------------
    let appData = {
        decks: [],           // {id, name, folderId, coverGradient, cards[]}
        folders: [],        // {id, name}
        xp: 0,
        level: 1,
        streak: { current: 0, best: 0, lastReviewDate: null, activityLog: {} },
        achievements: [],
        reviewHistory: [],   // {timestamp, deckId, cardId, rating, xpEarned}
        settings: { theme: 'dark' },
        tagsLibrary: []
    };
    let currentNav = 'dashboard';
    let studySession = { deckId: null, cardsDue: [], index: 0, sessionStart: null, reviewed: [] };
    let focusActive = false;

    // Helper: SM-2 upgrade
    function updateCardSM2(card, rating) { // rating: 0=again,1=hard,2=good,3=easy
        let quality = [0,2,3,4][rating];
        if(card.repetitions === undefined) { card.repetitions = 0; card.ease = 2.5; card.interval = 0; }
        if(quality >= 3) card.repetitions++;
        else card.repetitions = 0;
        if(card.repetitions === 1) card.interval = 1;
        else if(card.repetitions === 2) card.interval = 6;
        else card.interval = Math.round(card.interval * card.ease);
        card.ease = Math.max(1.3, card.ease + (0.1 - (5-quality)*(0.08+(5-quality)*0.02)));
        card.dueDate = Date.now() + (card.interval * 86400000);
        card.lastReviewed = Date.now();
        let xpGain = [5,10,15,25][rating];
        appData.xp += xpGain;
        updateLevelAndXP();
        saveFull();
        return xpGain;
    }

    function updateLevelAndXP() {
        let newLevel = Math.floor(Math.sqrt(appData.xp / 100)) + 1;
        appData.level = Math.max(1, newLevel);
        let nextXP = 100 * (appData.level * appData.level);
        let currentXPforLevel = appData.xp - (100 * (appData.level-1)*(appData.level-1));
        document.getElementById('xpProgress')?.setAttribute('max', nextXP);
        document.getElementById('xpProgress')?.setAttribute('value', currentXPforLevel);
        document.getElementById('xpBar').innerHTML = `⭐ Lv.${appData.level} <progress id="xpProgress" value="${currentXPforLevel}" max="${nextXP}" style="width:100%"></progress>`;
    }

    function saveFull() { localStorage.setItem('memora_pro', JSON.stringify(appData)); }
    function loadData() {
        let raw = localStorage.getItem('memora_pro');
        if(raw) { appData = JSON.parse(raw); if(!appData.decks) appData.decks = []; if(!appData.folders) appData.folders = []; if(!appData.reviewHistory) appData.reviewHistory = []; if(!appData.xp) appData.xp = 0; }
        if(!appData.decks.length) {
            appData.decks.push({ id: 'deck1', name: 'Neuroscience', folderId: null, cards: [{ id:'c1', front:'Synapse', back:'Junction between neurons', tags:['biology'], repetitions:0,ease:2.5,interval:0,dueDate:0,lastReviewed:0 },{ id:'c2', front:'Plasticity', back:'Brain ability to change', tags:['neuro'], repetitions:0,ease:2.5,interval:0,dueDate:0 }] });
            appData.decks.push({ id: 'deck2', name: 'JavaScript Mastery', folderId: null, cards: [{ id:'c3', front:'Closure', back:'Function with preserved scope', tags:['js'], repetitions:0,ease:2.5,interval:0,dueDate:0 }] });
        }
        if(!appData.streak) appData.streak = { current:0, best:0, lastReviewDate:null, activityLog:{} };
        updateLevelAndXP();
        renderCurrentView();
    }

    function renderCurrentView() {
        const container = document.getElementById('mainView');
        if(currentNav === 'dashboard') renderDashboard(container);
        else if(currentNav === 'decks') renderDecksManager(container);
        else if(currentNav === 'study') renderStudyHub(container);
        else if(currentNav === 'focus') startFocusMode();
        else if(currentNav === 'stats') renderStatsAnalytics(container);
        else if(currentNav === 'settings') renderSettings(container);
    }

    function renderDashboard(cont) {
        let dueCount = appData.decks.flatMap(d => d.cards).filter(c => (!c.dueDate || c.dueDate <= Date.now())).length;
        let mastered = appData.decks.flatMap(d=>d.cards).filter(c=>(c.repetitions>=5 && c.ease>2.3)).length;
        let totalReviews = appData.reviewHistory.length;
        let retention = totalReviews ? (appData.reviewHistory.filter(r=>[2,3].includes(r.rating)).length/totalReviews*100).toFixed(0) : 0;
        let heatmapHtml = `<div class="glass-card"><h3>🔥 Streak: ${appData.streak.current} days (best ${appData.streak.best})</h3><div class="heatmap" style="display:flex; gap:4px; flex-wrap:wrap;">${generateHeatmap()}</div></div>`;
        cont.innerHTML = `<div class="dashboard-stats"><div class="stat-tile"><i class="fas fa-calendar-day"></i> Cards Due<br><span style="font-size:2rem;">${dueCount}</span></div><div class="stat-tile"><i class="fas fa-chart-line"></i> Retention<br><span style="font-size:2rem;">${retention}%</span></div><div class="stat-tile"><i class="fas fa-trophy"></i> XP<br><span style="font-size:2rem;">${appData.xp}</span></div><div class="stat-tile"><i class="fas fa-crown"></i> Mastered<br>${mastered}</div></div>${heatmapHtml}<div class="glass-card" style="margin-top:20px;"><h3>Achievements 🏆</h3><div id="achievementsGrid">${renderAchievements()}</div></div>`;
    }

    function generateHeatmap() {
        let now = new Date(); let days = [];
        for(let i=29; i>=0; i--) { let d = new Date(now); d.setDate(now.getDate()-i); let key = d.toDateString(); let active = appData.streak.activityLog?.[key]; days.push(`<div style="width:12px;height:12px;background:${active?'#10b981':'#334155'};border-radius:3px;" title="${key}"></div>`); }
        return days.join('');
    }

    function renderAchievements() { return ['First Card','First Deck','Study 7 Days','Master 100 Cards','Review 1000'].map(ach => `<span style="background:#4f46e5; border-radius:40px; padding:4px 12px;">🏅 ${ach}</span>`).join(''); }

    function renderDecksManager(cont) {
        let folderOptions = `<div class="flex-group"><button id="newDeckBtn"><i class="fas fa-plus"></i> New Deck</button><button id="newFolderBtn"><i class="fas fa-folder"></i> New Folder</button></div><div class="grid-decks" id="decksContainer">`;
        appData.decks.forEach(deck => {
            let due = deck.cards.filter(c => (!c.dueDate || c.dueDate <= Date.now())).length;
            folderOptions += `<div class="glass-card" draggable="true" data-deck-id="${deck.id}"><div class="deck-cover" style="background:${deck.coverGradient || 'linear-gradient(145deg,#818cf8,#c084fc)'}"></div><h3>${deck.name}</h3><p>${deck.cards.length} cards · ${due} due</p><button class="studyDeckBtn" data-id="${deck.id}">Study Now</button> <button class="editDeckBtn" data-id="${deck.id}">Edit</button><button class="deleteDeckBtn" data-id="${deck.id}">Delete</button></div>`;
        });
        folderOptions += `</div>`;
        cont.innerHTML = folderOptions;
        document.querySelectorAll('.studyDeckBtn').forEach(btn => btn.addEventListener('click', (e) => { startDeckStudy(btn.dataset.id); }));
        document.getElementById('newDeckBtn')?.addEventListener('click', () => { let name = prompt('Deck name'); if(name) appData.decks.push({ id: Date.now()+''+Math.random(), name, cards: [], folderId: null, coverGradient: `linear-gradient(145deg, #${Math.floor(Math.random()*16777215).toString(16)}, #4f46e5)` }); saveFull(); renderDecksManager(cont); });
        document.getElementById('newFolderBtn')?.addEventListener('click', () => { let fname = prompt('Folder name'); if(fname) appData.folders.push({ id: Date.now()+'', name: fname }); saveFull(); renderDecksManager(cont); });
    }

    function startDeckStudy(deckId) {
        let deck = appData.decks.find(d=>d.id===deckId);
        if(!deck) return;
        let dueCards = deck.cards.filter(c => (!c.dueDate || c.dueDate <= Date.now()));
        if(dueCards.length===0) { showToast('No cards due! Come back later.', '#f97316'); return; }
        studySession.deckId = deckId;
        studySession.cardsDue = dueCards;
        studySession.index = 0;
        studySession.sessionStart = Date.now();
        studySession.reviewed = [];
        currentNav = 'study';
        renderStudySession();
    }

    function renderStudySession() {
        const cont = document.getElementById('mainView');
        if(!studySession.cardsDue.length) { renderCurrentView(); return; }
        let card = studySession.cardsDue[studySession.index];
        cont.innerHTML = `<div class="glass-card" style="text-align:center; min-height:400px;"><h2 id="studyFront">${card.front}</h2><div id="studyBack" style="display:none; margin-top:20px;">${card.back}</div><div class="flex-group" style="justify-content:center; margin-top:40px;"><button id="flipStudyBtn"><i class="fas fa-sync"></i> Flip</button><button id="againBtn" class="btn">Again</button><button id="hardBtn">Hard</button><button id="goodBtn">Good</button><button id="easyBtn">Easy</button></div><div>${studySession.index+1}/${studySession.cardsDue.length}</div></div>`;
        document.getElementById('flipStudyBtn')?.addEventListener('click',()=>{ let frontDiv=document.getElementById('studyFront'); let backDiv=document.getElementById('studyBack'); if(frontDiv.style.display!=='none'){frontDiv.style.display='none'; backDiv.style.display='block';} else {frontDiv.style.display='block'; backDiv.style.display='none';} });
        const handleRating = (ratingVal) => {
            let currentCard = studySession.cardsDue[studySession.index];
            let xpEarned = updateCardSM2(currentCard, ratingVal);
            appData.reviewHistory.push({ timestamp: Date.now(), deckId: studySession.deckId, cardId: currentCard.id, rating: ratingVal, xpEarned });
            updateStreak();
            saveFull();
            studySession.index++;
            if(studySession.index < studySession.cardsDue.length) renderStudySession();
            else showSessionSummary();
        };
        document.getElementById('againBtn')?.addEventListener('click',()=>handleRating(0));
        document.getElementById('hardBtn')?.addEventListener('click',()=>handleRating(1));
        document.getElementById('goodBtn')?.addEventListener('click',()=>handleRating(2));
        document.getElementById('easyBtn')?.addEventListener('click',()=>handleRating(3));
    }

    function updateStreak() {
        let today = new Date().toDateString();
        let last = appData.streak.lastReviewDate;
        if(last !== today) {
            let yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
            if(last === yesterday.toDateString()) appData.streak.current++;
            else appData.streak.current = 1;
            appData.streak.lastReviewDate = today;
            appData.streak.best = Math.max(appData.streak.best, appData.streak.current);
            if(!appData.streak.activityLog) appData.streak.activityLog = {};
            appData.streak.activityLog[today] = true;
            saveFull();
        }
    }

    function showSessionSummary() {
        let duration = Math.floor((Date.now() - studySession.sessionStart)/1000);
        let correct = studySession.reviewed.filter(r=>r>=2).length;
        let accuracy = studySession.cardsDue.length? (correct/studySession.cardsDue.length*100).toFixed(0):0;
        let xpGain = appData.reviewHistory.slice(-studySession.cardsDue.length).reduce((a,b)=>a+b.xpEarned,0);
        alert(`📊 Session Summary\n✅ Accuracy: ${accuracy}%\n⭐ XP Earned: ${xpGain}\n⏱️ Time: ${Math.floor(duration/60)}m ${duration%60}s`);
        renderCurrentView();
    }

    function startFocusMode() {
        focusActive = true;
        let overlay = document.getElementById('focusOverlay');
        overlay.style.display = 'flex';
        let allDue = appData.decks.flatMap(d=>d.cards).filter(c=>c.dueDate<=Date.now());
        if(allDue.length===0) { document.getElementById('focusQuestion').innerHTML = 'No cards due! Great job!'; return; }
        let idx = 0;
        let showCard = () => {
            let card = allDue[idx];
            document.getElementById('focusQuestion').innerHTML = card.front;
            let actionsDiv = document.getElementById('focusActions');
            actionsDiv.innerHTML = `<button id="focusAgain">Again</button><button id="focusHard">Hard</button><button id="focusGood">Good</button><button id="focusEasy">Easy</button><button id="focusFlip">Flip</button>`;
            let flipped = false;
            document.getElementById('focusFlip').onclick = () => { if(!flipped) { document.getElementById('focusQuestion').innerHTML = card.back; flipped=true; } else { document.getElementById('focusQuestion').innerHTML = card.front; flipped=false; }};
            const answer = (rating) => { updateCardSM2(card, rating); saveFull(); idx++; if(idx<allDue.length) showCard(); else { alert('Focus session complete!'); overlay.style.display='none'; renderCurrentView(); } };
            document.getElementById('focusAgain').onclick = () => answer(0);
            document.getElementById('focusHard').onclick = () => answer(1);
            document.getElementById('focusGood').onclick = () => answer(2);
            document.getElementById('focusEasy').onclick = () => answer(3);
        };
        showCard();
        let pomodoroTime = 1500;
        let timerInterval = setInterval(() => { if(pomodoroTime<=0) clearInterval(timerInterval); let min = Math.floor(pomodoroTime/60); let sec = pomodoroTime%60; document.getElementById('pomodoroTimer').innerHTML = `${min}:${sec<10?'0'+sec:sec}`; if(pomodoroTime>0) pomodoroTime--; },1000);
        document.getElementById('exitFocus').onclick = () => { overlay.style.display='none'; clearInterval(timerInterval); renderCurrentView(); };
    }

    function renderStatsAnalytics(cont) {
        let totalReviews = appData.reviewHistory.length;
        let avgAccuracy = totalReviews?(appData.reviewHistory.filter(r=>r.rating>=2).length/totalReviews*100).toFixed(0):0;
        cont.innerHTML = `<div class="glass-card"><h2>📊 Advanced Analytics</h2><div>Reviews total: ${totalReviews}</div><div>Accuracy: ${avgAccuracy}%</div><canvas id="retentionChart" width="400" height="200"></canvas><div>Daily activity: ${Object.keys(appData.streak.activityLog||{}).length} days active</div></div>`;
        let ctx = document.getElementById('retentionChart')?.getContext('2d');
        if(ctx) { ctx.fillStyle = '#818cf8'; ctx.fillRect(0,0,50,100); }
    }

    function renderSettings(cont) {
        cont.innerHTML = `<div class="glass-card"><h2>🎨 Themes</h2><div><button data-theme="dark">Dark</button><button data-theme="light">Light</button><button data-theme="cyberpunk">Cyberpunk</button></div><h3>⚙️ Backup & Restore</h3><button id="exportAllData">Export JSON</button><input type="file" id="importFileInput" accept=".json"><button id="importDataBtn">Import Backup</button><button id="resetData">Factory Reset</button></div>`;
        document.querySelectorAll('[data-theme]').forEach(btn => btn.addEventListener('click', (e) => { document.body.className = e.target.dataset.theme; appData.settings.theme = e.target.dataset.theme; saveFull(); }));
        document.getElementById('exportAllData')?.addEventListener('click', () => { let dataStr = JSON.stringify(appData); let blob = new Blob([dataStr], {type:"application/json"}); let a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download="memora_backup.json"; a.click(); });
        document.getElementById('importDataBtn')?.addEventListener('click', () => { let file = document.getElementById('importFileInput').files[0]; if(file) { let reader = new FileReader(); reader.onload = (e) => { let imported = JSON.parse(e.target.result); appData = imported; saveFull(); loadData(); showToast('Restored!'); }; reader.readAsText(file); } });
        document.getElementById('resetData')?.addEventListener('click', () => { if(confirm('Wipe all progress?')) { localStorage.removeItem('memora_pro'); location.reload(); } });
    }

    function showToast(msg, color='#10b981') { let t = document.getElementById('globalToast'); t.innerText = msg; t.style.background = color; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2000); }

    function openCommandPalette() { let pal = document.getElementById('commandPalette'); pal.style.display = 'block'; document.getElementById('cmdInput').focus(); }
    window.addEventListener('keydown', (e) => { if(e.ctrlKey && e.key === 'k') { e.preventDefault(); openCommandPalette(); } if(e.key === ' ' && currentNav === 'study') e.preventDefault(); if(e.key === '1') document.getElementById('againBtn')?.click(); if(e.key === '2') document.getElementById('hardBtn')?.click(); if(e.key === '3') document.getElementById('goodBtn')?.click(); if(e.key === '4') document.getElementById('easyBtn')?.click(); });
    document.getElementById('cmdInput')?.addEventListener('input', (e) => { let val = e.target.value.toLowerCase(); let results = appData.decks.filter(d=>d.name.toLowerCase().includes(val)).concat(appData.decks.flatMap(d=>d.cards).filter(c=>c.front.toLowerCase().includes(val))); document.getElementById('cmdResults').innerHTML = results.slice(0,5).map(r=>`<div>${r.name||r.front}</div>`).join(''); });
    document.addEventListener('click', (e) => { if(!e.target.closest('#commandPalette')) document.getElementById('commandPalette').style.display = 'none'; });

    document.querySelectorAll('.nav-item').forEach(nav => { nav.addEventListener('click', () => { document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active')); nav.classList.add('active'); currentNav = nav.dataset.nav; renderCurrentView(); }); });
    loadData();
</script>
</body>
</html>
